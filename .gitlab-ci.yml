# Mirror of .github/workflows/ci.yml for development MRs on the GitLab
# remote. The GitHub workflow remains the public-release gate; this
# config lets dev branches hit the same gates locally before merge.
#
# Source of truth for CI semantics: .github/workflows/ci.yml. Whenever
# a check is added or tweaked there, mirror it here.

stages:
  - validate
  - test
  - security
  - build

variables:
  # Pinned to 1.26.3 (not the floating 1.26 tag) to pick up
  # GO-2026-4980, GO-2026-4971, and GO-2026-4918 stdlib fixes that
  # govulncheck started flagging on 2026-05-07. Bump explicitly when
  # rolling forward to a newer Go release.
  GO_IMAGE: harbor.example.com/dockerhub-proxy/library/golang:1.26.3
  GOLANGCI_VERSION: v2.11.4
  GOFLAGS: "-mod=readonly"

default:
  image: ${GO_IMAGE}
  # GOPATH lives outside CI_PROJECT_DIR so gofmt + lint do not walk
  # into the dependency cache (which contains thousands of .go files
  # not all of which are gofmt-clean by upstream's choice). The cache
  # block still keys off go.sum; the path /go-cache is preserved
  # across runners by GitLab's distributed cache.
  cache:
    key:
      files:
        - go.sum
    paths:
      - .gocache/

before_script:
  - export GOPATH=/tmp/gopath
  - export GOMODCACHE=$CI_PROJECT_DIR/.gocache
  - export GOCACHE=/tmp/gobuild
  - export PATH=$GOPATH/bin:$PATH
  - mkdir -p $GOPATH $GOMODCACHE $GOCACHE

# ---- validate stage ----

gofmt:
  stage: validate
  script:
    # Only walk repo-owned Go source. Excludes both the current
    # GOMODCACHE path (.gocache) and the prior path (.go-cache) so a
    # stale runner cache from earlier configs does not get linted.
    - >
      find . \( -path ./.gocache -o -path ./.go-cache \) -prune
      -o -name '*.go' -print
      | xargs gofmt -l | tee /tmp/fmt.out
    - test ! -s /tmp/fmt.out
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

govet:
  stage: validate
  script:
    - go vet ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

golangci-lint:
  stage: validate
  image: harbor.example.com/dockerhub-proxy/golangci/golangci-lint:${GOLANGCI_VERSION}
  before_script: []
  script:
    - golangci-lint run --timeout 5m
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---- test stage ----

# Mirror of .github/workflows/ci.yml `test` job: race-enabled,
# coverage-gated at 100% repo-wide. The integer floor matches the
# GitHub workflow so dev MRs that drop coverage below the gate fail
# here too.
test:
  stage: test
  script:
    - go test -race -timeout 15m -coverprofile=coverage.out ./...
    - |
      TOTAL=$(go tool cover -func=coverage.out | awk 'END {gsub("%",""); print $NF}')
      echo "total coverage: ${TOTAL}%"
      if [ "${TOTAL%.*}" -lt 100 ]; then
        echo "coverage below 100% — blocking merge"
        exit 1
      fi
  artifacts:
    when: on_failure
    paths:
      - coverage.out
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---- security stage ----

govulncheck:
  stage: security
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---- build stage ----

build:
  stage: build
  script:
    - go build -v ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# tfplugindocs validate gates docs/ against the schema in code. Same
# gate as GitHub. Skipped on the wsclient-scaffold MR because the
# wsclient package adds no resources or data sources, but kept here
# so future MRs that touch docs get caught.
docs:
  stage: build
  script:
    - go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest
    - tfplugindocs validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
